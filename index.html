<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR Scanner - Identificare Chei</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
      
      /* Am scos pelicula neagra de peste tot ecranul */
      #scanning-overlay {
        display: flex; align-items: flex-start; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: transparent; /* Aici era problema! Acum e transparent */
        z-index: 10; text-align: center; padding-top: 60px;
        pointer-events: none;
      }
      
      /* Punem putin negru DOAR in spatele textului, ca o eticheta */
      #scanning-overlay div {
        background: rgba(0, 0, 0, 0.7);
        color: white; font-size: 16px;
        padding: 10px 20px; border-radius: 10px;
      }
      
      /* Am mutat butonul mai sus (bottom: 120px) ca sa nu se ascunda sub meniul Safari */
      #start-audio-btn {
        position: absolute; bottom: 120px; left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #2ecc71; color: white;
        border: none; border-radius: 10px;
        font-size: 18px; font-weight: bold;
        cursor: pointer; z-index: 20;
        box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>
    
    <div id="scanning-overlay">
      <div>Sistemul AR pornește...<br><br>Îndreaptă camera către o cheie pentru a o scana.</div>
    </div>

    <button id="start-audio-btn">🔊 Activează Asistentul Vocal</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-assets>
        <a-mixin id="infoText" text="color: white; align: center; wrapCount: 20; width: 0.9;"></a-mixin>
        <a-mixin id="panelBase" geometry="primitive: plane; height: 0.4; width: 1.1" material="opacity: 0.9; transparent: true;"></a-mixin>
      </a-assets>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity mixin="panelBase" material="color: #2c3e50" position="0 0.3 0" scale="0.8 0.8 0.8">
          <a-text value="CHEIE AUTO\nTip: Telecomandă Fob\nButoane: Închis, Deschis, Portbagaj" mixin="infoText"></a-text>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-entity mixin="panelBase" material="color: #2c3e50" position="0 0.3 0" scale="0.8 0.8 0.8">
          <a-text value="CHEIE AUTO\nTip: Telecomandă Fob\nButoane: Închis, Deschis, Portbagaj" mixin="infoText"></a-text>
        </a-entity>
      </a-entity>


      <a-entity mindar-image-target="targetIndex: 2">
        <a-entity mixin="panelBase" material="color: #8e44ad" position="0 0.3 0" scale="0.8 0.8 0.8">
          <a-text value="CHEIE LABORATOR\nAcces: Sala de Robotică\nIdentificare: Capăt violet" mixin="infoText"></a-text>
        </a-entity>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-entity mixin="panelBase" material="color: #8e44ad" position="0 0.3 0" scale="0.8 0.8 0.8">
          <a-text value="CHEIE LABORATOR\nAcces: Sala de Robotică\nIdentificare: Capăt violet" mixin="infoText"></a-text>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // === Sistemul Audio pentru Deficienți de Vedere ===
      
      let synth = window.speechSynthesis;
      let isAudioActive = false;
      let lastSpokenIndex = -1; // Previne repetarea continuă a aceluiași mesaj

      // Mesajele audio pentru fiecare index (pozele 0 și 1 sunt mașina, 2 și 3 sunt laboratorul)
      const audioTexts = {
        0: "Am identificat cheia de mașină. Este o telecomandă neagră, dreptunghiulară, cu trei butoane pe ea: pentru blocare, deblocare și deschiderea portbagajului.",
        1: "Am identificat cheia de mașină. Este o telecomandă neagră cu butoane.",
        2: "Am identificat cheia laboratorului de robotică. Aceasta este o cheie metalică clasică, având capătul de prindere rotund și de culoare violet.",
        3: "Am identificat cheia laboratorului de robotică. Cheia are un capăt rotund, violet, și o lamă metalică cu zimți."
      };

      const speak = (text, index) => {
        if (!isAudioActive) return; 
        if (index === lastSpokenIndex) return; // Dacă tocmai a zis asta, nu repeta obsesiv
        
        synth.cancel(); // Oprește vorbirea anterioară
        
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ro-RO';
        utterance.pitch = 1;
        utterance.rate = 0.95; // O idee mai rar pentru claritate

        synth.speak(utterance);
        lastSpokenIndex = index;

        // Resetează indexul după 5 secunde pentru a putea fi scanată din nou mai târziu
        setTimeout(() => {
            if(lastSpokenIndex === index) lastSpokenIndex = -1;
        }, 5000);
      };

      // Detectarea obiectelor de către cameră
      document.querySelector('a-scene').addEventListener('loaded', function () {
        const targets = document.querySelectorAll('[mindar-image-target]');

        targets.forEach((target) => {
          target.addEventListener('targetFound', event => {
            const index = target.getAttribute('mindar-image-target').targetIndex;
            const textToSpeak = audioTexts[index];
            if (textToSpeak) {
              speak(textToSpeak, index);
            }
          });
        });
      });

      // Activarea sistemului la apăsarea butonului
      const startAudioBtn = document.getElementById('start-audio-btn');
      startAudioBtn.addEventListener('click', () => {
        isAudioActive = true;
        
        // Un mic mesaj de bun venit pentru confirmare
        let welcome = new SpeechSynthesisUtterance("Asistentul vocal a fost activat. Scanează o cheie.");
        welcome.lang = 'ro-RO';
        synth.speak(welcome);
        
        // Ascunde butonul după ce a fost apăsat
        startAudioBtn.style.display = 'none'; 
      });

    </script>
  </body>
</html>
